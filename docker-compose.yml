version: '3.9'

services:
  # ── Application ─────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: finance_app
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_NAME: FinanceDashboard
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/finance_db
      JWT_SECRET: change-me-in-production-min-32-characters!!
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: change-me-refresh-secret-min-32-chars!!
      JWT_REFRESH_EXPIRES_IN: 30d
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ''
      REDIS_TTL: 300
      CORS_ORIGINS: http://localhost:3001,http://localhost:5173
      THROTTLE_TTL: 60
      THROTTLE_LIMIT: 100
      BCRYPT_ROUNDS: 12
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - finance_net

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: finance_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finance_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d finance_db']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance_net

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: finance_redis
    restart: unless-stopped
    command: redis-server --save 20 1 --loglevel warning
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - finance_net

  # ── Dev-only: Adminer (DB GUI) ───────────────────────────────────────────────
  adminer:
    image: adminer:latest
    container_name: finance_adminer
    restart: unless-stopped
    ports:
      - '8080:8080'
    depends_on:
      - postgres
    profiles:
      - dev
    networks:
      - finance_net

volumes:
  postgres_data:
  redis_data:

networks:
  finance_net:
    driver: bridge
